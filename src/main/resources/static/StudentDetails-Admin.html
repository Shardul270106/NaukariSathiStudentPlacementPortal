<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Details</title>

    <style>

        *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:"Segoe UI", sans-serif;
        }

        body{
        background:#f5f6fa;
        display:flex;
        justify-content:center;
        align-items:flex-start;
        min-height:100vh;
        padding:40px;
        }

        /* CARD */

        .profile-card{
        width:750px;
        background:white;
        border-radius:12px;
        box-shadow:0 6px 20px rgba(0,0,0,0.1);
        padding:30px;
        }

        /* HEADER */

        .profile-header{
        display:flex;
        align-items:center;
        gap:20px;
        margin-bottom:25px;
        border-bottom:1px solid #eee;
        padding-bottom:20px;
        }

        .avatar{
        width:70px;
        height:70px;
        border-radius:50%;
        background:#3C3E4A;
        color:white;
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:26px;
        font-weight:600;
        }

        .profile-name{
        font-size:22px;
        font-weight:600;
        }

        .profile-email{
        font-size:14px;
        color:#666;
        }

        /* INFO GRID */

        .info-grid{
        display:grid;
        grid-template-columns:repeat(2,1fr);
        gap:20px;
        margin-top:20px;
        }

        .info-box{
        background:#f9f9f9;
        padding:15px;
        border-radius:8px;
        }

        .info-label{
        font-size:13px;
        color:#777;
        margin-bottom:5px;
        }

        .info-value{
        font-size:16px;
        font-weight:500;
        }

        /* SECTION */

        .section{
        margin-top:30px;
        }

        .section-title{
        font-size:18px;
        font-weight:600;
        margin-bottom:10px;
        }

        /* SKILLS */

        .skills{
        display:flex;
        flex-wrap:wrap;
        gap:10px;
        }

        .skill-tag{
        background:#eef0f6;
        padding:6px 12px;
        border-radius:20px;
        font-size:13px;
        }

        /* PROJECT */

        .project-card{
        background:#f9f9f9;
        padding:15px;
        border-radius:8px;
        }

        /* EXPERIENCE */

        .experience-box{
        background:#f9f9f9;
        padding:15px;
        border-radius:8px;
        line-height:1.6;
        }

        /* BUTTONS */

        .actions{
        margin-top:30px;
        display:flex;
        justify-content:space-between;
        }

        .btn{
        padding:10px 18px;
        border:none;
        border-radius:6px;
        cursor:pointer;
        font-size:14px;
        }

        .resume-btn{
        background:#3C3E4A;
        color:white;
        }

        .resume-btn:hover{
        background:#2c2e36;
        }

        .back-btn{
        background:#ddd;
        }

        .back-btn:hover{
        background:#ccc;
        }

    </style>
</head>

<body>

<div id="student"></div>

<script>

    // ❌ OLD — ID exposed in URL
    // const params = new URLSearchParams(window.location.search);
    // const id = params.get("userId");

    // ✅ NEW — ID hidden in sessionStorage
    const id = sessionStorage.getItem("viewStudentId");

    if (!id) {
        document.getElementById("student").innerHTML = "<p>No student selected.</p>";
        throw new Error("No student ID");
    }

    fetch("https://naukarisathistudentplacementportal.onrender.com/admin/students/" + id)
    .then(res => res.json())
    .then(student => {
        const profile = student.studentProfile || {};
        const initials = student.name.split(" ").map(n => n[0]).join("").toUpperCase();
        const skillsHTML = (profile.skills || "").split(",")
            .map(skill => `<div class="skill-tag">${skill.trim()}</div>`).join("");

        document.getElementById("student").innerHTML = `
            <div class="profile-card">
                <div class="profile-header">
                    <div class="avatar">${initials}</div>
                    <div>
                        <div class="profile-name">${student.name}</div>
                        <div class="profile-email">${student.email}</div>
                    </div>
                </div>
                <div class="info-grid">
                    <div class="info-box"><div class="info-label">Contact</div><div class="info-value">${student.contact || "-"}</div></div>
                    <div class="info-box"><div class="info-label">Username</div><div class="info-value">${student.username || "-"}</div></div>
                    <div class="info-box"><div class="info-label">College ID</div><div class="info-value">${student.collegeid || "-"}</div></div>
                    <div class="info-box"><div class="info-label">MU Enrollment ID</div><div class="info-value">${student.muenrollmentid || "-"}</div></div>
                    <div class="info-box"><div class="info-label">ABC ID</div><div class="info-value">${student.abcid || "-"}</div></div>
                    <div class="info-box"><div class="info-label">College</div><div class="info-value">${profile.collegeName || "-"}</div></div>
                    <div class="info-box"><div class="info-label">Branch</div><div class="info-value">${profile.branch || "-"}</div></div>
                    <div class="info-box"><div class="info-label">Year</div><div class="info-value">${profile.year || "-"}</div></div>
                    <div class="info-box"><div class="info-label">Semester</div><div class="info-value">${profile.semester || "-"}</div></div>
                    <div class="info-box"><div class="info-label">CGPA</div><div class="info-value">${profile.cgpa || "-"}</div></div>
                </div>
                <div class="section">
                    <div class="section-title">Skills</div>
                    <div class="skills">${skillsHTML}</div>
                </div>
                <div class="section">
                    <div class="section-title">Projects</div>
                    <div class="project-card">${profile.projects || "No projects available"}</div>
                </div>
                <div class="section">
                    <div class="section-title">Experience</div>
                    <div class="experience-box">${profile.experience || "No experience available"}</div>
                </div>
                <div class="actions">
                    <button class="btn back-btn" onclick="history.back()">← Back</button>
                    <button class="btn resume-btn" onclick="viewResume()">View Resume</button>
                </div>
            </div>`;
    });

    // ✅ POST resume — no ID in address bar
    function viewResume() {
        fetch("https://naukarisathistudentplacementportal.onrender.com/resume/view", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ userId: parseInt(id) })
        })
        .then(res => {
            if (!res.ok) { alert("Resume not found."); throw new Error(); }
            return res.blob();
        })
        .then(blob => {
            const url = URL.createObjectURL(blob);
            window.open(url);
        })
        .catch(err => console.error(err));
    }
</script>

</body>
</html>
